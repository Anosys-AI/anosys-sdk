name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio ruff
          pip install -e packages/python/core
          pip install -e packages/python/openai
          pip install -e packages/python/openai_agents
          pip install -e packages/python/claude_code

      - name: Lint
        run: ruff check packages/python/

      - name: Test core
        run: pytest packages/python/core/tests -v

      - name: Test openai
        run: pytest packages/python/openai/tests -v

      - name: Test openai_agents
        run: pytest packages/python/openai_agents/tests -v

      - name: Test claude_code
        run: pytest packages/python/claude_code/tests -v

  test-js:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: packages/js
        run: npm install

      - name: Test openai
        working-directory: packages/js/openai
        run: npm test

      - name: Test openai-agents
        working-directory: packages/js/openai-agents
        run: npm test

      - name: Test claude-code
        working-directory: packages/js/claude-code
        run: npm test
