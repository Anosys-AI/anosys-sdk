[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anosys-claude-code"
version = "0.2.6"
description = "AnoSys observability hook for Claude Code — automatic audit logging of Claude Code sessions"
authors = [{name = "AnoSys", email = "support@anosys.ai"}]
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
]
keywords = ["anosys", "claude", "claude-code", "observability", "monitoring", "audit", "llm"]
dependencies = [
    "requests>=2.25.1",
]

[project.scripts]
anosys-claude-code = "anosys_sdk_claude_code.cli:main"

[project.urls]
Homepage = "https://anosys.ai"
Documentation = "https://docs.anosys.ai"
Repository = "https://github.com/anosys-ai/anosys-sdk"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"anosys_sdk_claude_code" = ["py.typed"]

[tool.ruff.lint.per-file-ignores]
"src/anosys_sdk_claude_code/mapper.py" = ["E701", "E702"]
