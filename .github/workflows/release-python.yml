name: Release Python

on:
  push:
    tags:
      - "core-v*"
      - "openai-py-v*"
      - "openai-agents-py-v*"
      - "claude-code-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. core-v1.0.9)"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve package directory from tag
        id: pkg
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          case "$tag" in
            core-v*)              dir="packages/python/core" ;;
            openai-py-v*)         dir="packages/python/openai" ;;
            openai-agents-py-v*)  dir="packages/python/openai_agents" ;;
            claude-code-v*)       dir="packages/python/claude_code" ;;
            *)                    echo "Unknown tag prefix: $tag" >&2; exit 1 ;;
          esac
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag from $dir"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build

      - name: Build package
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.pkg.outputs.dir }}/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
