name: Release Python

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    # Only run for tags belonging to a Python package
    if: |
      startsWith(github.event.release.tag_name, 'core-v') ||
      startsWith(github.event.release.tag_name, 'openai-py-v') ||
      startsWith(github.event.release.tag_name, 'openai-agents-py-v') ||
      startsWith(github.event.release.tag_name, 'claude-code-v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve package directory from tag
        id: pkg
        run: |
          tag="${{ github.event.release.tag_name }}"
          case "$tag" in
            core-v*)              dir="packages/python/core" ;;
            openai-py-v*)         dir="packages/python/openai" ;;
            openai-agents-py-v*)  dir="packages/python/openai_agents" ;;
            claude-code-v*)       dir="packages/python/claude_code" ;;
            *)                    echo "Unknown tag prefix: $tag" >&2; exit 1 ;;
          esac
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "Releasing from $dir"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build

      - name: Build package
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.pkg.outputs.dir }}/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
