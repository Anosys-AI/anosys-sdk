name: Release JavaScript

on:
  push:
    tags:
      - "openai-js-v*"
      - "openai-agents-js-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve package directory from tag
        id: pkg
        run: |
          tag="${GITHUB_REF##*/}"
          case "$tag" in
            openai-js-v*)         dir="packages/js/openai" ;;
            openai-agents-js-v*)  dir="packages/js/openai-agents" ;;
            *)                    echo "Unknown tag prefix: $tag" >&2; exit 1 ;;
          esac
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag from $dir"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace dependencies
        working-directory: packages/js
        run: npm install

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
